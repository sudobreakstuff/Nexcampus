name: Build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            patchelf

      - name: Install Python deps
        run: pip install pywebview PyInstaller Pillow

      - name: Build
        run: python3 -m PyInstaller --onefile --add-data "static:static" --add-data "index.html:." --add-data "manifest.json:." --add-data "sw.js:." --add-data "tesseract-pkg/tesseract-bin:tesseract-bin" --name "NexCampus-linux" server.py

      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          files: dist/NexCampus-linux
          generate_release_notes: true
          make_latest: true

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python deps
        run: pip install pywebview PyInstaller Pillow

      - name: Build
        run: python -m PyInstaller --onefile --noconsole --add-data "static;static" --add-data "index.html;." --add-data "manifest.json;." --add-data "sw.js;." --name "NexCampus-windows.exe" server.py

      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          files: dist/NexCampus-windows.exe
          generate_release_notes: true
          make_latest: true

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build APK with Buildozer
        run: |
          docker pull kivy/buildozer:latest
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            -e BUILDKIT_PROGRESS=plain \
            kivy/buildozer:latest \
            bash -c "yes | buildozer android debug 2>&1" || \
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            kivy/buildozer:latest \
            bash -c "yes | buildozer android debug 2>&1"

      - name: Find APK
        id: find-apk
        run: |
          apk=$(ls bin/*.apk 2>/dev/null | head -1)
          if [ -n "$apk" ]; then
            echo "filename=$apk" >> $GITHUB_OUTPUT
            echo "APK found: $apk"
          else
            echo "No APK found in bin/"
            ls -la bin/ 2>/dev/null || echo "bin/ directory not found"
          fi

      - name: Upload
        if: steps.find-apk.outputs.filename != ''
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.find-apk.outputs.filename }}
          generate_release_notes: true
          make_latest: true
