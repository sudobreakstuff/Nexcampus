name: Build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            patchelf

      - name: Install Python deps
        run: pip install pywebview PyInstaller Pillow

      - name: Build
        run: python3 -m PyInstaller --onefile --add-data "static:static" --add-data "index.html:." --add-data "tesseract-pkg/tesseract-bin:tesseract-bin" --name "NexCampus-linux" server.py

      - name: Upload binary
        uses: softprops/action-gh-release@v2
        with:
          files: dist/NexCampus-linux
          generate_release_notes: true
          make_latest: true

      - name: Upload install scripts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            install/install.sh
            install/install.ps1
            install/nexcampus.desktop

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python deps
        run: pip install pywebview PyInstaller Pillow

      - name: Install Tesseract
        run: choco install tesseract --version 5.3.3.20231005 -y

      - name: Bundle Tesseract
        shell: pwsh
        run: |
          $tessDir = "$env:ProgramFiles\Tesseract-OCR"
          mkdir tesseract-win -Force
          Copy-Item "$tessDir\tesseract.exe" tesseract-win\
          Copy-Item "$tessDir\*.dll" tesseract-win\
          Copy-Item "$tessDir\tessdata\eng.traineddata" tesseract-win\

      - name: Build
        run: python -m PyInstaller --onefile --noconsole --add-data "static;static" --add-data "index.html;." --add-data "tesseract-win;tesseract-win" --name "NexCampus-windows.exe" server.py

      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          files: dist/NexCampus-windows.exe
          generate_release_notes: true
          make_latest: true

