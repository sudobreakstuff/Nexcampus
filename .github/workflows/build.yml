name: Build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            patchelf

      - name: Install Python deps
        run: pip install pywebview PyInstaller Pillow

      - name: Build
        run: python3 -m PyInstaller --onefile --add-data "static:static" --add-data "index.html:." --add-data "manifest.json:." --add-data "sw.js:." --add-data "tesseract-pkg/tesseract-bin:tesseract-bin" --name "NexCampus-linux" server.py

      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          files: dist/NexCampus-linux
          generate_release_notes: true
          make_latest: true

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python deps
        run: pip install pywebview PyInstaller Pillow

      - name: Build
        run: python -m PyInstaller --onefile --noconsole --add-data "static;static" --add-data "index.html;." --add-data "manifest.json;." --add-data "sw.js;." --name "NexCampus-windows.exe" server.py

      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          files: dist/NexCampus-windows.exe
          generate_release_notes: true
          make_latest: true

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Buildozer global
        uses: actions/cache@v4
        with:
          path: .buildozer_global
          key: buildozer-global-${{ hashFiles('buildozer.spec') }}

      - name: Build APK
        uses: ArtemSBulgakov/buildozer-action@v1
        id: buildozer
        with:
          workdir: .
          buildozer_version: stable

      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.buildozer.outputs.filename }}
          generate_release_notes: true
          make_latest: true
