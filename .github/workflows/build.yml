name: Build Release Binaries

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Download Tesseract binaries
        run: |
          mkdir tesseract-win
          # Download pre-built Tesseract 5.3.3 from GitHub
          curl -L -o tesseract.zip "https://github.com/UB-Mannheim/tesseract/releases/download/v5.3.3.20231005/tesseract-ocr-w64-setup-5.3.3.20231005.exe"
          7z x tesseract.zip -otesseract-temp -y
          # Copy Tesseract exe and DLLs
          Get-ChildItem -Path tesseract-temp -Recurse -Filter "tesseract.exe" | Select-Object -First 1 | ForEach-Object { Copy-Item $_.FullName tesseract-win\ }
          Get-ChildItem -Path tesseract-temp -Recurse -Filter "*.dll" | ForEach-Object { Copy-Item $_.FullName tesseract-win\ }
          # Download eng.traineddata
          mkdir tesseract-win\tessdata
          curl -L -o tesseract-win\tessdata\eng.traineddata "https://github.com/tesseract-ocr/tessdata/raw/main/eng.traineddata"

      - name: Build Windows binary
        run: |
          pyinstaller --onefile --noconsole `
            --icon "static\icons\icon.ico" `
            --add-data "static;static" `
            --add-data "index.html;." `
            --add-data "tesseract-win;tesseract-win" `
            --add-data "python-embed;python-embed" `
            --name "NexCampus-windows" server.py

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/NexCampus-windows.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build Linux binary
        run: |
          pyinstaller --onefile \
            --icon "static/icons/icon-512.png" \
            --add-data "static:static" \
            --add-data "index.html:." \
            --add-data "tesseract-pkg/tesseract-bin:tesseract-bin" \
            --name "NexCampus-linux" server.py

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/NexCampus-linux
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
