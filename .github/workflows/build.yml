name: Build Release Binaries

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Install Python dependencies
        run: pip install numpy scipy scikit-learn Pillow lxml nltk pypdf2

      - name: Build Windows EXE
        shell: cmd
        run: |
          echo === Checking data dirs ===
          dir static\index.html && echo static: OK
          dir python-embed\pythonw.exe && echo python-embed: OK
          REM Tesseract is optional — create empty dir if not present
          if not exist tesseract-win mkdir tesseract-win
          if not exist tesseract-win\tessdata mkdir tesseract-win\tessdata
          type nul > tesseract-win\tesseract-placeholder.txt
          echo === Building ===
          pyinstaller --onefile --noconsole --icon static\icons\icon.ico --add-data "static;static" --add-data "index.html;." --add-data "tesseract-win;tesseract-win" --add-data "python-embed;python-embed" --name NexCampus-windows server.py
          echo === Result ===
          dir dist\NexCampus-windows.exe
          echo "BUILD_DONE=1" >> $env:GITHUB_ENV

      - name: Upload to Release
        if: success()
        run: |
          $asset = "dist\NexCampus-windows.exe"
          if (-not (Test-Path $asset)) { Write-Error "Binary not found"; exit 1 }
          $headers = @{Authorization="Bearer ${{ secrets.GITHUB_TOKEN }}"}
          # Get release info
          $release = Invoke-RestMethod -Uri "https://api.github.com/repos/${{ github.repository }}/releases/tags/${{ github.ref_name }}" -Headers $headers
          # Delete any existing Windows binary
          foreach ($a in $release.assets) {
            if ($a.name -eq "NexCampus-windows.exe") {
              Invoke-RestMethod -Uri $a.url -Method Delete -Headers $headers
              Write-Host "Deleted stale $($a.name) ($([math]::Round($a.size/1MB))MB)"
            }
          }
          # Upload new binary
          $uploadUrl = $release.upload_url -replace '\{.*\}', "?name=NexCampus-windows.exe"
          $result = Invoke-RestMethod -Uri $uploadUrl -Method Post -Headers @{Authorization="Bearer ${{ secrets.GITHUB_TOKEN }}"; "Content-Type"="application/octet-stream"} -InFile $asset
          Write-Host "Uploaded: $($result.name) — $([math]::Round($result.size/1MB))MB"

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build Linux binary
        run: |
          pyinstaller --onefile \
            --icon "static/icons/icon-512.png" \
            --add-data "static:static" \
            --add-data "index.html:." \
            --add-data "tesseract-pkg/tesseract-bin:tesseract-bin" \
            --name "NexCampus-linux" server.py
          echo "BUILD_DONE=1" >> $GITHUB_ENV

      - name: Upload to Release
        if: success()
        run: |
          ASSET="dist/NexCampus-linux"
          if [ -f "$ASSET" ]; then
            RELEASE=$(curl -sS -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${{ github.repository }}/releases/tags/${{ github.ref_name }}")
            UPLOAD_URL=$(echo "$RELEASE" | python3 -c "import sys,json; print(json.load(sys.stdin)['upload_url'].replace('{?name,label}','?name=NexCampus-linux'))")
            curl -sS -X POST -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Content-Type: application/octet-stream" \
              --data-binary @"$ASSET" "$UPLOAD_URL"
            echo "Uploaded Linux binary"
          else
            echo "Binary not found at $ASSET"
            exit 1
          fi
